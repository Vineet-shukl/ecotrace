##############################################################################
# cloudbuild.yaml — EcoTrace CI/CD Pipeline
#
# Triggers on push to `main`:
#   1. Run unit tests (functions)
#   2. Build Vite SPA
#   3. Build & push nudge service Docker image to Artifact Registry
#   4. Deploy Cloud Run nudge service
#   5. Deploy Firebase (Functions + Firestore Rules + Hosting)
#
# Secrets from Secret Manager:
#   - firebase-token → FIREBASE_TOKEN
##############################################################################

steps:
  # ── Step 1: Install & test Cloud Functions ────────────────────────────────
  - id: 'functions-install'
    name: 'node:20-slim'
    dir: 'functions'
    entrypoint: 'npm'
    args: ['ci']

  - id: 'functions-test'
    name: 'node:20-slim'
    dir: 'functions'
    entrypoint: 'npx'
    args: ['jest', '--forceExit', '--ci']
    waitFor: ['functions-install']

  # ── Step 2: Build Vite SPA ────────────────────────────────────────────────
  - id: 'spa-install'
    name: 'node:20-slim'
    dir: 'ecotrace'
    entrypoint: 'npm'
    args: ['ci']

  - id: 'spa-build'
    name: 'node:20-slim'
    dir: 'ecotrace'
    entrypoint: 'npm'
    args: ['run', 'build']
    env:
      - 'VITE_NUDGE_SERVICE_URL=https://ecotrace-nudges-${_CLOUD_RUN_REGION}-run.app'
    waitFor: ['spa-install']

  # ── Step 3: Build & push nudge service image ──────────────────────────────
  - id: 'docker-build'
    name: 'gcr.io/cloud-builders/docker'
    dir: 'cloudrun/nudges'
    args:
      - 'build'
      - '-t'
      - '${_AR_REGISTRY}/${PROJECT_ID}/ecotrace/nudge-service:${SHORT_SHA}'
      - '-t'
      - '${_AR_REGISTRY}/${PROJECT_ID}/ecotrace/nudge-service:latest'
      - '.'
    waitFor: ['functions-test']   # must pass tests before building image

  - id: 'docker-push'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_AR_REGISTRY}/${PROJECT_ID}/ecotrace/nudge-service'
    waitFor: ['docker-build']

  # ── Step 4: Deploy Cloud Run service ──────────────────────────────────────
  - id: 'cloudrun-deploy'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ecotrace-nudges'
      - '--image=${_AR_REGISTRY}/${PROJECT_ID}/ecotrace/nudge-service:${SHORT_SHA}'
      - '--region=${_CLOUD_RUN_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--concurrency=80'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=30'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=${PROJECT_ID}'
    waitFor: ['docker-push']

  # ── Step 5: Deploy Firebase (Functions + Rules + Hosting) ─────────────────
  - id: 'firebase-deploy'
    name: 'node:20-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g firebase-tools@latest
        # Authenticate via the build service account's Application Default
        # Credentials (resolved from the Cloud Build metadata server). No
        # FIREBASE_TOKEN secret needed — firebase login:ci tokens are deprecated.
        firebase deploy \
          --only functions,firestore:rules,hosting \
          --project ${PROJECT_ID} \
          --force
    waitFor: ['spa-build', 'cloudrun-deploy']

# ── Substitutions (overrideable per trigger) ──────────────────────────────────
substitutions:
  _CLOUD_RUN_REGION: 'us-central1'
  _AR_REGISTRY: 'us-central1-docker.pkg.dev'

# ── Build options ──────────────────────────────────────────────────────────────
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_MEDIUM'

# ── Timeout ───────────────────────────────────────────────────────────────────
timeout: '1200s'   # 20 minutes max

# ── Images to push to Artifact Registry ───────────────────────────────────────
images:
  - '${_AR_REGISTRY}/${PROJECT_ID}/ecotrace/nudge-service:${SHORT_SHA}'
  - '${_AR_REGISTRY}/${PROJECT_ID}/ecotrace/nudge-service:latest'
